<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Medical Lecture Viewer</title>

<link rel="stylesheet" href="viewerstyle.css">

</head>

<body>

<!-- ============================= -->
<!-- TOP BAR -->
<!-- ============================= -->

<header class="topbar">

<button id="menuToggle">☰</button>

<div class="title">
Medical Lecture Viewer
</div>

<div class="top-buttons">

<button id="fullscreenBtn">Fullscreen</button>

</div>

</header>



<!-- ============================= -->
<!-- MAIN LAYOUT -->
<!-- ============================= -->

<div class="layout">



<!-- ============================= -->
<!-- SIDEBAR -->
<!-- ============================= -->

<aside class="sidebar" id="sidebar">

<h3>Chapter Topics</h3>

<div class="topic-group">

<div class="topic-header">
Adipose Tissue
</div>

<div class="topic-list">

<div onclick="goSlide(0)">Introduction</div>

<div onclick="goSlide(1)">Structure</div>

<div onclick="goSlide(2)">Lipogenesis</div>

<div onclick="goSlide(3)">Lipolysis</div>

<div onclick="goSlide(4)">Clinical Importance</div>

</div>

</div>

</aside>



<!-- ============================= -->
<!-- SLIDE VIEWER -->
<!-- ============================= -->

<main class="viewer-area">

<div class="slide-stage" id="slideStage">

<iframe id="slideFrame"></iframe>

</div>



<div class="controls">

<button id="prevBtn">◀ Previous</button>

<button id="nextBtn">Next ▶</button>

<span id="counter"></span>

</div>

</main>

</div>



<script src="viewerstyle.js"></script>

</body>

</html>
