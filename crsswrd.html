<!DOCTYPE html>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: white;
    }

    .container {
      text-align: center;
      background: rgba(255,255,255,0.08);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      width: 350px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    h1 {
      margin-bottom: 30px;
      font-size: 2rem;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 15px 0;
      text-decoration: none;
      color: white;
      background: #2563eb;
      border-radius: 12px;
      transition: 0.3s ease;
      font-size: 1.1rem;
      font-weight: bold;
    }

    .btn:hover {
      background: #1d4ed8;
      transform: scale(1.03);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Crossword Puzzles</h1>

    <a href="puzzle1.html" class="btn">Puzzle 1</a>
    <a href="puzzle2.html" class="btn">Puzzle 2</a>
  </div>

</body>
</html>
